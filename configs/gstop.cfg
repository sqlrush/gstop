[main]
# 监控数据刷新间隔（单位：秒，默认值：3)
interval = 3
# 监控数据持久化功能刷新间隔，为0则表示不开启监控数据持久化功能（单位：秒，默认值：0）
log_interval = 0
# 内存监控大盘刷新间隔，为0则表示不开启内存监控大盘功能（单位：秒，默认值：30）
mem_interval = 30
# 健康大盘跨所有用户库的统计信息历史与失效索引刷新间隔；大盘内按r可立即刷新（单位：秒，默认值：300）
health_slow_interval = 300
# 是否支持动态内存相关指标的获取（默认值：false）
dynamic_mem_enable = false
# 动态内存相关指标的最低刷新间隔，不建议修改（单位：秒，默认值：60）
dynamic_mem_interval = 60
# 动态内存相关指标支持的最大CPU利用率，当CPU利用率超过此值时，动态内存相关的指标停止刷新（默认值：50）
dynamic_mem_cpu_thresh = 50
# 工具连接数据库使用的用户名（默认值："rdsAdmin"）
user = "rdsAdmin"
# 是否免密登录，非免密登录需要输入密码（默认值：true）
password_free = true
# 工具连接的数据库的监听端口（默认值：8000）
port = 8000
# 工具连接的数据库名称（默认值："postgres"）
database = "postgres"
# 监控数据日志保存目录
persist_file_base_dir = "logs"
# 监控数据日志单个文件的最大大小，超过此大小的日志会被压缩（单位：MB）
persist_file_max_size = 5
# 监控数据日志最大保留数量
max_backup_count = 30
# 工具支持的最大并发用户数量
max_concurrent_users = 3
# 执行SQL以及操作系统命令的耗时阈值，超过阈值时会打印耗时日志（单位：秒）
sql_command_time_thresh = 3
# 单个采集模块的硬超时；超时后本轮显示空白，下轮成功后继续按上次成功快照计算（单位：秒）
collect_timeout = 5
# 监控模块刷新以及应急预案模块分析耗时阈值，超过阈值时会打印耗时日志（单位：秒）
refresh_analyze_time_thresh = 3

[alarm]
# 定义监控指标超过阈值后需要写告警日志的文件
alarm_file = "/var/log/abcsys.log"
# 当出现异常后，后续的持续观察窗口（单位：秒）
observation_window = 600
# 当出现异常后，在观察窗口内连续出现的次数阈值，达到阈值后才会上报告警
report_thresh = 3
# 当上报告警后，后续的持续抑制窗口（单位：秒），在抑制窗口内不会再上报相同的告警
suppression_window = 600
# 各监控指标的自定义阈值，名称需要和界面上的名称保持一致，未定义阈值的监控指标不会上报告警（当前只支持操作系统和实例模块的监控指标）
# LOAD = 20
%CPU = 80

[emergency]
# 应急预案特性总开关
enable = true
# 应急预案在内存中保存的最大快照数量
max_snapshot_number = 30
# 触发应急后自动保存快照数据到日志文件，日志文件保存的目录
emergency_log_base_dir = "logs_emergency"
# 触发应急后自动保存快照数据到日志文件，配置项为单个日志文件的最大大小，超过此大小的日志会被进行分割（单位：MB）
log_file_max_size = 10

[emergency.inspection]
# 巡检特性总开关
enable = true
# 巡检项配置格式：ALARM_ID = "NAME,INTERVAL,THRESHOLD,CHECK_CONSECUTIVE"，不需要的巡检项可以注释掉
#   NAME：巡检项名称
#   INTERVAL：巡检的时间间隔（单位：秒）
#   THRESHOLD：巡检指标的告警阈值，当监控指标大于等于阈值时即认为发生了异常
#   CHECK_CONSECUTIVE：当发生异常时，是否检查连续发生的次数（参考alarm中的observation_window和report_thresh），1表示检查，0表示不检查
ALM-5101260 = "进程内存使用率异常,60,90,1"
ALM-5101263 = "动态内存使用率异常,60,90,1"
ALM-5101756 = "用户库慢SQL数量异常,3600,100,0"
ALM-5023543 = "云数据库 GaussDB大于120分钟长事务超阈值,300,1,0"
ALM-5101989 = "云数据库 GaussDB索引失效个数超过阈值,3600,1,0"
ALM-5102000 = "云数据库 GaussDB产生未vacuum的表,3600,1,0"
ALM-5102001 = "云数据库 GaussDB产生未analyze的表,3600,1,0"
ALM-5102006 = "云数据库 GaussDB锁等待状态会话比率(DN_用户)过高,60,90,1"

[emergency.plan_change]
# 触发计划跳变应急后自动保存的快照数量
snapshot_persist_number = 300
# 和当前时刻进行对比的历史快照的范围
snapshot_compare_scope = 10
# 计划跳变保存在内存中的最大SQL统计数据快照的数量（100个快照大概占用7MB内存）
max_sql_snapshot_number = 600
# 操作系统CPU使用率阈值
os_cpu_thresh = 60
# SQL当前的活跃会话数相比某个历史时刻活跃会话数的倍数阈值
sql_acs_pct_thresh = 2
# SQL当前的活跃会话数相比某个历史时刻活跃会话数增长的差值阈值
sql_acs_abs_thresh = 20
# SQL当前的活跃会话数占实例整体活跃会话数的比例阈值
sql_acs_ins_pct_thresh = 0.3
# SQL当前的执行耗时相比某个历史时刻执行耗时的倍数阈值
sql_latency_pct_thresh = 2
# 触发计划跳变应急后，针对发生计划跳变的SQL进行持续观察的时间（单位：秒）
observation_time = 600

[emergency.performance_jitter]
# 触发性能抖动应急后自动保存的快照数量
snapshot_persist_number = 120
# 和当前时刻进行对比的历史快照的范围
snapshot_compare_scope = 10
# 实例当前的活跃会话数相比某个历史时刻活跃会话数的倍数阈值
ins_acs_pct_thresh = 2
# 实例当前的活跃会话数相比某个历史时刻活跃会话数增长的差值阈值
ins_acs_abs_thresh = 20
# 操作系统当前CPU使用率相比某个历史时刻CPU使用率的倍数阈值
os_cpu_pct_thresh = 2
# 操作系统CPU使用率阈值
os_cpu_thresh = 50
# 数据库使用的数据盘当前的IO平均响应时间相比某个历史时刻的IO平均响应时间的倍数阈值
rw_await_pct_thresh = 2
# 数据库使用的数据盘当前的IO平均响应时间相比某个历史时刻的IO平均响应时间增长的差值阈值（单位：毫秒）
rw_await_abs_thresh = 5
# 数据库使用的数据盘当前请求队列的平均长度相比某个历史时刻的平均长度的倍数阈值
aqu_sz_pct_thresh = 2
# 数据库使用的数据盘当前请求队列的平均长度相比某个历史时刻的平均长度增长的差值阈值
aqu_sz_abs_thresh = 5
# 数据库P80指标阈值（单位：毫秒）
p80_thresh = 10
# 数据库P80指标连续超过阈值的次数，当满足该条件时自动触发告警，该数值需要小于snapshot_compare_scope
p80_breach_streak = 3
# 数据库P80指标触发告警时，自动收集性能数据的方式（"none"：不收集性能数据，"perf_command"：使用perf命令，"system_func"：使用数据库内置的系统函数）
p80_collector_type = "none"
# 数据库P80指标触发告警并且收集性能数据的方式为perf_command时，自动执行的perf命令（需要工具运行的用户具有相关的perf权限）
p80_alert_execute_command = "perf record -e sched:sched_switch,sched:sched_wakeup,cpu-cycles -a --call-graph fp -o perf_$(date +%Y%m%d_%H%M%S).data sleep 1"
# 数据库P80指标触发告警并且收集性能数据的方式为system_func时，自动执行的内置系统函数（需要gs_perf_service正常运行）
p80_alert_execute_func = "select gs_perf_start_detail(1000);"

[emergency.slow_sql]
# 自动终结慢SQL开关，不开启只会检测慢SQL并打印日志，开启后会自动终结慢SQL所在会话
# 当support_terminate为false时，此开关打开后也不会生效
terminate = false
# 自动终结慢SQL特性排除的数据库，不同数据库之间以分号分隔
exclude_databases = "postgres"
# 自动终结慢SQL特性排除的用户，不同用户之间以分号分隔
exclude_users = "rdsAdmin;Ruby"
# 存储过程列表，不同存储过程之间以分号分隔
procedure = "procedure1;procedure2;procedure3"
# 自定义生效时间段以及检查策略，名称按照strategyN的规则命名（N逐渐递增，范围：0~9）
# 支持的时间范围（00:00~23:59），不支持跨天配置，在未配置的时间段内，自动终结慢SQL功能不生效
# 格式：起始时间,结束时间,检查间隔,慢SQL阈值,慢存储过程阈值（单位：秒）
# strategy0 = "00:00,08:00,600,180,300"
# strategy1 = "08:00,19:00,300,60,900"
# strategy2 = "19:00,23:59,600,180,300"

[emergency.cpu_full]
# 触发CPU满应急的操作系统CPU使用率阈值（百分比数值，取值范围：0~100）
os_cpu_thresh = 80
# 触发CPU满应急后，检测耗时久的事务的时间阈值，运行时间超过阈值的事务会被高亮展示（单位：毫秒）
overtime_thresh = 50

[emergency.io_full]
# 触发IO满应急的数据盘平均队列长度（aqu-sz）阈值
io_aqu_sz_thresh = 20
# 触发IO满应急后，检测耗时久的事务的时间阈值，运行时间超过阈值的事务会被高亮展示（单位：毫秒）
overtime_thresh = 50

[emergency.thread_pool_full]
# 触发线程池满应急的线程池使用率阈值（百分比数值，取值范围：0~100）
thread_pool_full_thresh = 70
# 触发线程池满应急后，检测耗时久的事务的时间阈值，运行时间超过阈值的事务会被高亮展示（单位：毫秒）
overtime_thresh = 50
# 自动终结开关，开启后在触发应急时会自动终结状态为"None"、"idle"、"idle in transaction"状态的会话
# 当support_terminate为false时，此开关打开后也不会生效
terminate = false
# 触发线程池满应急后，如果开启了自动终结开关，在自动终结会话时需要排除的用户白名单，不同用户之间以逗号分隔
user_whitelist = ""

[emergency.connections_full]
# 触发连接数满应急的线程池使用率阈值（百分比数值，取值范围：0~100）
connections_full_thresh = 90
# 自动终结开关，开启后在触发应急时会自动终结状态为"None"、"idle"、"idle in transaction"状态的会话
# 当support_terminate为false时，此开关打开后也不会生效
terminate = false
# 触发连接数满应急后，如果开启了自动终结开关，在自动终结会话时需要排除的用户白名单，不同用户之间以逗号分隔
user_whitelist = ""

[emergency.memory_full]
# 触发内存满应急后自动保存的快照数量
snapshot_persist_number = 120
# 单个动态内存使用率阈值（百分比数值，取值范围：0~100）
dynamic_ctx_pct_thresh = 80
# 内存使用率阈值（百分比数值，取值范围：0~100）
process_memory_pct_thresh = 90
