# gsbench workload generator
# Author: WangYingJie <sqlrush@gmail.com>

[database]
host = 127.0.0.1
port = 5433
database = postgres
user = bench
password_env = GSBENCH_PASSWORD
sslmode = disable
application_name = gsbench
connect_timeout = 5s

[run]
scenarios = tp_cpu
duration = 10m
ramp_interval = 2s
profile = quick
dry_run = false

[data]
schema = gsbench
max_size_gb = 5
min_free_disk_percent = 20
reuse_existing = true

[safety]
cpu_target_percent = 95
max_connections = 500
max_workers = 256
query_timeout = 30s
restore_on_exit = true
allow_instance_parameter_change = true
allow_database_restart = false
restart_command =

[scenario.tp_cpu]
enabled = true
read_percent = 70
hot_percent = 20

[scenario.ap_cpu]
enabled = false

[scenario.mixed_cpu]
enabled = false
tp_percent = 80

[scenario.connection_pool]
enabled = false
target_percent = 95
idle_percent = 60
idle_in_transaction_percent = 20

[scenario.thread_pool]
enabled = false
target_percent = 95

[scenario.dynamic_memory]
enabled = false
target_percent = 90

[scenario.plan_regression]
enabled = false
trigger = index_unusable
minimum_slowdown = 2.0

[scenario.lock_storm]
enabled = false
chain_depth = 5
waiters_per_blocker = 10
deadlock = false

[scenario.vacuum_pressure]
enabled = false
mode = vacuum
allow_vacuum_full = false
